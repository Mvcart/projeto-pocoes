<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administração - Poções e Soluções</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="container">
    <h1>🪄 Administração - Poções e Soluções</h1>
    <p>Gerencie o catálogo de poções da loja.</p>

    <hr style="border-color:#444; margin: 20px 0;">

    <h2>Cadastrar Nova Poção</h2>
    <form id="createPotionForm">
      <input type="text" name="name" placeholder="Nome da poção" required>
      <textarea name="description" placeholder="Descrição" rows="3" required></textarea>
      <input type="text" name="image" placeholder="URL ou caminho da imagem" required>
      <input type="number" step="0.01" name="price" placeholder="Preço (em moedas)" required>
      <button type="submit" class="btn">Adicionar Poção</button>
    </form>

    <hr style="border-color:#444; margin: 30px 0;">

    <h2>Poções Cadastradas</h2>
    <div id="potionList" class="potion-grid">
      <!-- Renderizado via JS -->
    </div>

    <div class="footer">
      <p>© 1867 - Poções e Soluções - Beco da Última Saída</p>
      <p>Contato: merigold@pocoes-solucoes.com | +55 (11) 99999-9999</p>
    </div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
